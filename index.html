<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Papa ❤️</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        padding: 10px;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 1.8rem;
        margin: 10px 0;
    }

    .photo {
        width: 100%;
        border-radius: 15px;
        margin: 15px 0;
    }

    p {
        font-size: 1rem;
        line-height: 1.5;
    }

    .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 12px 18px;
        background: #ff6f61;
        color: white;
        border-radius: 25px;
        text-decoration: none;
        font-size: 1rem;
    }

    .btn:active {
        transform: scale(0.95);
    }

    footer {
        margin-top: 15px;
        font-size: 0.8rem;
        color: gray;
    }
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday Papa 🎂</h1>

    <!-- Replace with your image -->
    <img src="image.jpg" alt="Papa Photo" class="photo">

    <p>
        Dear Papa ❤️,<br><br>
        You are my strength, my guide, and my hero.  
        Thank you for everything you do for me.I'm nothing without you.  
        Wishing you a wonderful birthday full of happiness 🎁
    </p>

    <p>Love you always 💖</p>

    <a href="#" class="btn">🎊 Celebrate</a>

    <footer>Made with ❤️ by your child</footer>
</div>

</body>
</html>
